name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: this workflow only reads the checkout (B23 hardening).
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs (not floating tags) — supply-chain hardening.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/ scripts/

      - name: Migrations apply cleanly (fresh DB)
        run: uv run alembic upgrade head
        env:
          GOVCON_DB_URL: sqlite:///ci.db

      - name: Tests
        run: uv run pytest -q
